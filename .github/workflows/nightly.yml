name: Nightly validation

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC — off-peak, avoids NBA API busy hours
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Run test suite
        run: pytest

      - name: Run smoke test (live NBA API)
        run: python scripts/smoke_test.py
